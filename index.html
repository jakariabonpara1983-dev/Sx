<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SX ABIR™RATUL • VIP EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --neon: #00ff88; --cyber: #00f3ff; --bg: #020205; }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: var(--bg); color: #fff; height: 100vh; overflow: hidden; font-family: 'Rajdhani', sans-serif; display: flex; align-items: center; justify-content: center; }
        
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 255, 136, 0.1) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 255, 136, 0.1) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 0; pointer-events: none;
        }

        .ui-panel { 
            width: 320px; z-index: 9000; 
            background: rgba(2, 5, 10, 0.95); border-radius: 20px; 
            border: 2px solid var(--neon); box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            backdrop-filter: blur(20px); padding: 0; overflow: hidden;
            animation: borderGlow 4s infinite alternate;
        }

        @keyframes borderGlow {
            0% { border-color: var(--neon); box-shadow: 0 0 20px var(--neon); }
            100% { border-color: var(--cyber); box-shadow: 0 0 20px var(--cyber); }
        }

        .panel-header { 
            background: linear-gradient(90deg, rgba(0, 255, 136, 0.3), transparent); 
            padding: 15px; border-bottom: 1px solid rgba(0, 255, 136, 0.5);
            display: flex; justify-content: space-between; align-items: center;
        }

        .glitch-text { 
            font-family: 'Orbitron'; font-size: 42px; font-weight: 900; 
            text-shadow: 0 0 20px var(--neon); color: #fff;
        }

        #resOverlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); z-index: 10000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; }
        #resOverlay.show { transform: translate(-50%, -50%) scale(1); }
        
        .status-bar { font-size: 9px; color: var(--neon); margin-top: 15px; letter-spacing: 3px; font-weight: bold; }
        .timer-box { font-family: 'Orbitron'; color: var(--cyber); text-shadow: 0 0 10px var(--cyber); }
    </style>
</head>
<body onload="startEngine()">

    <div class="ui-panel">
        <div class="panel-header">
            <span class="text-[12px] font-bold text-white font-['Orbitron']">👑 SX ABIR™RATUL VIP 👑</span>
            <i id="shield-icon" class="fa-solid fa-shield-halved text-neon animate-pulse text-xl"></i>
        </div>
        
        <div class="p-6 text-center">
            <div class="text-[11px] text-gray-400 mb-2 tracking-widest uppercase">Target: <span id="period" class="text-neon">FETCHING...</span></div>
            <div class="timer-box mb-4 text-4xl font-black" id="timer">00:00</div>
            
            <div class="bg-black/60 border border-green-500/30 rounded-2xl p-6 relative">
                <div class="text-[10px] text-neon/60 mb-2 tracking-[5px] uppercase font-bold">Signal Result</div>
                <div id="p-res" class="glitch-text">WAIT</div>
                <div id="status-msg" class="status-bar animate-pulse">BYPASSING FIREWALL...</div>
            </div>
        </div>
    </div>

    <div id="resOverlay"><div id="resMsg"></div></div>

<script>
    // Security & Proxy Config
    const PROXY = "https://api.allorigins.win/get?url=";
    const TARGET_URL = "https://api.9987up.cc/api/web/native/v1/all/getHistoryIssuePage";
    let lastPeriod = "", currentPrediction = null, predictionHistory = {};

    function startEngine() {
        setInterval(() => {
            const d = new Date(); 
            const s = d.getSeconds();
            let rem = 60 - s;
            document.getElementById('timer').innerText = `00:${rem < 10 ? '0'+rem : rem}`;
            
            // Sync exactly at new period or every 10 seconds if waiting
            if(rem === 59 || rem === 1 || lastPeriod === "") syncData();
        }, 1000);
        syncData();
    }

    async function syncData() {
        try {
            const salt = Math.random().toString(36).substring(7);
            const apiCall = `${TARGET_URL}?type=1&salt=${salt}&_=${Date.now()}`;
            
            const response = await fetch(`${PROXY}${encodeURIComponent(apiCall)}`);
            const json = await response.json();
            const data = JSON.parse(json.contents);
            const latest = data.data.list[0];

            // Update Period
            const nextP = (BigInt(latest.issueNumber) + 1n).toString();
            document.getElementById('period').innerText = nextP;

            // Check if last prediction was a Win or Loss
            if(predictionHistory[latest.issueNumber]) {
                const actual = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
                const predicted = predictionHistory[latest.issueNumber];
                showResultAnim(predicted === actual);
                delete predictionHistory[latest.issueNumber]; // Clear memory
            }

            // Generate New Prediction if it's a new period
            if(latest.issueNumber !== lastPeriod) {
                lastPeriod = latest.issueNumber;
                
                // Advanced Algorithm: SHA-256 Bitwise Logic
                const hash = CryptoJS.SHA256(latest.issueNumber + latest.number).toString();
                const type = parseInt(hash.charAt(0), 16) % 2 === 0 ? "BIG" : "SMALL";
                
                const pRes = document.getElementById('p-res');
                pRes.innerText = type;
                pRes.style.color = type === 'BIG' ? '#00ff88' : '#ff003c';
                pRes.style.textShadow = `0 0 25px ${type === 'BIG' ? '#00ff88' : '#ff003c'}`;
                
                predictionHistory[nextP] = type;
                document.getElementById('status-msg').innerText = "ENCRYPTED SYNC ACTIVE";
            }
        } catch(e) {
            document.getElementById('status-msg').innerText = "REROUTING CONNECTION...";
        }
    }

    function showResultAnim(win) {
        const overlay = document.getElementById('resOverlay');
        const msg = document.getElementById('resMsg');
        
        msg.innerHTML = `<div style="color:${win ? '#00ff88' : '#ff003c'}; font-size: 60px; font-weight:900; font-family:'Orbitron'; text-shadow:0 0 30px ${win ? '#00ff88' : '#ff003c'};">${win ? 'WINNER' : 'LOSE'}</div>`;
        
        if(win) {
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
        }
        
        overlay.classList.add('show');
        setTimeout(() => overlay.classList.remove('show'), 3000);
    }
</script>
</body>
</html>
