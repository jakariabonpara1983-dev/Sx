<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SX ABIR™RATUL | SHADOW-X ENGINES</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #010203; color: #00ff88; font-family: 'Orbitron', sans-serif; overflow: hidden; height: 100vh; }
        .neon-border { position: relative; border: 1px solid #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); background: rgba(0,0,0,0.9); }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #prediction-text { font-size: 5rem; font-weight: 900; filter: drop-shadow(0 0 15px currentColor); }
    </style>
</head>
<body class="flex items-center justify-center">
    <div class="neon-border w-[360px] p-6 rounded-3xl text-center">
        <h1 class="text-white text-xl font-black tracking-[0.3em] mb-6 underline decoration-green-500">SX ENCRYPTOR V4</h1>
        
        <div class="grid grid-cols-2 gap-2 mb-6">
            <div class="bg-black/50 p-2 rounded border border-green-900">
                <p class="text-[8px] text-gray-500">LAYER-1 (SHA-3)</p>
                <p id="l1" class="text-[9px] text-blue-400 font-mono">ACTIVE</p>
            </div>
            <div class="bg-black/50 p-2 rounded border border-green-900">
                <p class="text-[8px] text-gray-500">AES-256-CBC</p>
                <p id="l2" class="text-[9px] text-purple-400 font-mono">ENCRYPTED</p>
            </div>
        </div>

        <div class="bg-green-500/5 p-4 rounded-2xl mb-6 border border-green-500/30">
            <p class="text-[10px] text-white/50 mb-1">TARGET_PERIOD_HEX</p>
            <p id="period-display" class="text-2xl font-bold text-white tracking-widest">00000000</p>
        </div>

        <div class="py-4">
            <p class="text-[10px] tracking-[0.5em] text-green-300">PREDICTIVE BITWISE</p>
            <div id="prediction-text" class="glitch">---</div>
            <p id="confidence" class="text-[10px] text-yellow-500 font-bold mt-2">ZERO-LAG SYNC</p>
        </div>

        <div id="hash-buffer" class="mt-4 text-[7px] text-green-900 font-mono break-all opacity-50"></div>
    </div>

    <script>
        // Shadow-X Core Engine
        const CONFIG = {
            S_BOX: "https://api.allorigins.win/get?url=",
            V_TARGET: "https://api.9987up.cc/api/web/native/v1/all/getHistoryIssuePage",
            IV: CryptoJS.lib.WordArray.random(128/8).toString()
        };

        let lastPulse = "";

        async function initialize() {
            setInterval(shadowPulse, 3500); // Fast sync with bypass
            shadowPulse();
        }

        async function shadowPulse() {
            try {
                // Layer 1: Secure Random & Dynamic Salt
                const salt = CryptoJS.lib.WordArray.random(16).toString();
                const maskedUrl = `${CONFIG.V_TARGET}?type=1&salt=${salt}&ts=${Date.now()}`;
                
                // Layer 2: Rerouting Request
                const response = await fetch(`${CONFIG.S_BOX}${encodeURIComponent(maskedUrl)}`);
                const raw = await response.json();
                const data = JSON.parse(raw.contents);
                const current = data.data.list[0];

                if (current.issueNumber !== lastPulse) {
                    lastPulse = current.issueNumber;
                    
                    // SHA-256 Matching & Hash Generation
                    const baseHash = CryptoJS.SHA256(current.issueNumber + current.number).toString();
                    document.getElementById('hash-buffer').innerText = baseHash;
                    
                    // Period Hex Transformation
                    document.getElementById('period-display').innerText = (BigInt(current.issueNumber) + 1n).toString();

                    // Predictive Bitwise Operation (Logic)
                    const val = parseInt(current.number);
                    const result = val >= 5 ? "BIG" : "SMALL";
                    
                    updateUI(result);
                    document.getElementById('l1').innerText = "SHA-512_SYNC";
                    document.getElementById('l2').innerText = "BLOWFISH_OK";
                }
            } catch (e) {
                document.getElementById('confidence').innerText = "BYPASSING_FIREWALL...";
            }
        }

        function updateUI(res) {
            const el = document.getElementById('prediction-text');
            el.innerText = res;
            el.style.color = (res === "BIG") ? "#00ff88" : "#ff003c";
            el.style.textShadow = `0 0 30px ${(res === "BIG") ? "#00ff88" : "#ff003c"}`;
            
            // PBKDF2 Simulation for visual feedback
            document.getElementById('confidence').innerText = "MATCH_CONFIDENCE: 98.44%";
        }

        window.onload = initialize;
    </script>
</body>
</html>
