<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SX ABIR™RATUL • RGB ULTIMATE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --rgb-speed: 3s; }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        
        body { 
            background: #000; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Full Screen RGB Border Glow */
        body::before {
            content: ""; position: absolute; inset: 0;
            border: 4px solid;
            border-image: linear-gradient(var(--angle), #ff0000, #00ff88, #00f3ff, #ff00ff, #ff0000) 1;
            animation: rotate-angle var(--rgb-speed) linear infinite;
            z-index: 10; pointer-events: none;
        }

        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes rotate-angle { to { --angle: 360deg; } }

        /* Premium RGB Panel */
        .premium-card {
            width: 90%; max-width: 400px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.2);
            position: relative; z-index: 5;
        }

        .rgb-text {
            background: linear-gradient(to right, #ff0000, #00ff88, #00f3ff, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .period-box { font-size: 1.5rem; color: #fff; letter-spacing: 5px; margin-bottom: 20px; }
        .prediction-val { font-size: 6rem; font-weight: 900; line-height: 1; margin: 20px 0; }
        
        /* Level/Step Display */
        .step-badge {
            display: inline-block;
            padding: 5px 20px;
            border-radius: 50px;
            background: #ff003c;
            color: #fff;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 15px #ff003c;
        }

        #status { font-size: 10px; margin-top: 20px; color: #00ff88; opacity: 0.7; }
    </style>
</head>
<body onload="ignite()">

    <div class="premium-card">
        <h1 class="rgb-text text-2xl font-black mb-8 tracking-widest">SX ABIR™RATUL VIP</h1>
        
        <div class="period-box">
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em]">Next Period</p>
            <span id="period" class="font-bold">--------</span>
        </div>

        <div id="step-container" class="mb-4" style="display:none;">
            <div id="step-id" class="step-badge">STEP 1</div>
        </div>

        <div class="py-4">
            <p class="text-[10px] text-cyan-400 font-bold tracking-[0.5em] uppercase">Signal Analysis</p>
            <div id="prediction" class="prediction-val rgb-text">WAIT</div>
        </div>

        <div id="status" class="animate-pulse">SYSTEM ENCRYPTED & SYNCED</div>
    </div>

<script>
    const PROXY = "https://api.allorigins.win/get?url=";
    const TARGET = "https://api.9987up.cc/api/web/native/v1/all/getHistoryIssuePage";
    
    let lastPeriod = "";
    let currentStep = 1;
    let pendingPrediction = null;

    function ignite() {
        setInterval(syncData, 3000);
        syncData();
    }

    async function syncData() {
        try {
            const api = `${TARGET}?type=1&_=${Date.now()}`;
            const response = await fetch(`${PROXY}${encodeURIComponent(api)}`);
            const json = await response.json();
            const market = JSON.parse(json.contents);
            const latest = market.data.list[0];

            // 1. Result Check (Win/Loss Logic)
            if (pendingPrediction && latest.issueNumber === pendingPrediction.target) {
                const actual = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
                
                if (pendingPrediction.type === actual) {
                    // WIN
                    triggerWin();
                    currentStep = 1; // Reset step on win
                    document.getElementById('step-container').style.display = "none";
                } else {
                    // LOSS
                    currentStep++; // Increase step on loss
                    document.getElementById('step-id').innerText = `STEP ${currentStep}`;
                    document.getElementById('step-container').style.display = "block";
                }
                pendingPrediction = null;
            }

            // 2. New Prediction Logic
            if (latest.issueNumber !== lastPeriod) {
                lastPeriod = latest.issueNumber;
                const nextP = (BigInt(latest.issueNumber) + 1n).toString();
                document.getElementById('period').innerText = nextP;

                // Secure SHA-256 Bitwise Logic
                const hash = CryptoJS.SHA256(latest.issueNumber + salt(8)).toString();
                const type = parseInt(hash.charAt(5), 16) % 2 === 0 ? "BIG" : "SMALL";
                
                const el = document.getElementById('prediction');
                el.innerText = type;
                el.style.backgroundImage = type === 'BIG' 
                    ? "linear-gradient(to bottom, #00ff88, #004422)" 
                    : "linear-gradient(to bottom, #ff003c, #440011)";
                
                pendingPrediction = { target: nextP, type: type };
            }
        } catch (e) {
            document.getElementById('status').innerText = "REROUTING VIA RGB TUNNEL...";
        }
    }

    function triggerWin() {
        // Massive Confetti & RGB Flash
        confetti({ particleCount: 400, spread: 150, origin: { y: 0.6 }, colors: ['#ff0000', '#00ff88', '#00f3ff'] });
        document.body.style.animation = "flash 0.5s 3";
    }

    function salt(len) {
        return Math.random().toString(36).substring(2, 2 + len);
    }
</script>

<style>
    @keyframes flash {
        0%, 100% { background: #000; }
        50% { background: #00ff8822; }
    }
</style>
</body>
</html>
