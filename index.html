<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SB DELTA • RGB ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --neon: #00ff88; --cyber: #00f3ff; --bg: #020205; }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* FULL SCREEN RGB ANIMATION */
        body { 
            margin: 0; background-color: var(--bg); color: #fff; height: 100vh; overflow: hidden; 
            font-family: 'Rajdhani', sans-serif; display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        body::before {
            content: ""; position: absolute; inset: 0;
            border: 6px solid;
            border-image: linear-gradient(var(--angle), #ff0000, #00ff88, #00f3ff, #ff00ff, #ff0000) 1;
            animation: rotate-angle 3s linear infinite;
            z-index: 10; pointer-events: none;
        }

        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes rotate-angle { to { --angle: 360deg; } }

        /* RGB Background Matrix */
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 255, 136, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 255, 136, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; z-index: 0; pointer-events: none;
        }

        .ui-panel { 
            width: 320px; z-index: 9000; 
            background: rgba(2, 5, 10, 0.98); border-radius: 25px; 
            border: 2px solid var(--neon); box-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
            backdrop-filter: blur(25px); padding: 0; overflow: hidden;
            animation: borderGlow 4s infinite alternate;
        }

        @keyframes borderGlow {
            0% { border-color: var(--neon); box-shadow: 0 0 20px var(--neon); }
            100% { border-color: var(--cyber); box-shadow: 0 0 20px var(--cyber); }
        }

        .panel-header { 
            background: linear-gradient(90deg, rgba(0, 255, 136, 0.3), transparent); 
            padding: 18px; border-bottom: 1px solid rgba(0, 255, 136, 0.5);
            display: flex; justify-content: space-between; align-items: center;
        }

        .glitch-text { 
            font-family: 'Orbitron'; font-size: 50px; font-weight: 900; 
            text-shadow: 0 0 25px var(--neon); color: #fff;
        }

        .step-display {
            background: #ff003c; color: white; padding: 4px 15px;
            border-radius: 50px; font-size: 12px; font-weight: bold;
            box-shadow: 0 0 15px #ff003c; display: none; margin-bottom: 10px;
        }

        #resOverlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); z-index: 10000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none;}
        #resOverlay.show { transform: translate(-50%, -50%) scale(1); }
        
        .timer-box { font-family: 'Orbitron'; color: var(--cyber); text-shadow: 0 0 15px var(--cyber); font-size: 45px; }
    </style>
</head>
<body onload="startEngine()">

    <div class="ui-panel">
        <div class="panel-header">
            <span class="text-[14px] font-bold text-white font-['Orbitron'] tracking-tighter">⚡ SB DELTA EDITION ⚡</span>
            <i class="fa-solid fa-bolt-lightning text-neon animate-bounce"></i>
        </div>
        
        <div class="p-8 text-center">
            <div id="step-tag" class="step-display">STEP 1</div>
            <div class="text-[12px] text-gray-400 mb-2 tracking-[4px] uppercase">Period: <span id="period" class="text-neon">---</span></div>
            <div class="timer-box mb-6 font-black" id="timer">00:00</div>
            
            <div class="bg-black/80 border-2 border-green-500/20 rounded-3xl p-8 relative">
                <div class="text-[11px] text-cyber/80 mb-3 tracking-[6px] uppercase font-bold">Signal Result</div>
                <div id="p-res" class="glitch-text">WAIT</div>
                <div class="text-[9px] text-neon mt-4 tracking-[3px] font-bold animate-pulse uppercase">Secure Delta Link</div>
            </div>
        </div>
    </div>

    <div id="resOverlay"><div id="resMsg"></div></div>

<script>
    const API = "https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";
    let lastPeriod = "", currentPrediction = null;
    let currentStep = 1; // Step System Logic
    
    function startEngine() {
        setInterval(() => {
            const d = new Date(); const s = d.getSeconds();
            let rem = 60 - s;
            document.getElementById('timer').innerText = `00:${rem < 10 ? '0'+rem : rem}`;
            if(rem === 59 || rem === 1) syncData();
        }, 1000);
        syncData();
    }

    async function syncData() {
        try {
            const res = await fetch(`${API}?ts=${Date.now()}`);
            const data = await res.json();
            const latest = data.data.list[0];
            
            // Checking Prediction for Step Logic
            if(currentPrediction && latest.issueNumber === currentPrediction.period) {
                const actual = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
                const isWin = currentPrediction.type === actual;
                
                if(isWin) {
                    currentStep = 1; // Reset to Step 1 on Win
                    document.getElementById('step-tag').style.display = "none";
                } else {
                    currentStep++; // Increase Step on Loss
                    document.getElementById('step-tag').innerText = `STEP ${currentStep}`;
                    document.getElementById('step-tag').style.display = "inline-block";
                }

                showResultAnim(isWin);
                currentPrediction = null;
            }
            
            if(latest.issueNumber !== lastPeriod) {
                lastPeriod = latest.issueNumber;
                const nextP = (BigInt(latest.issueNumber) + 1n).toString();
                document.getElementById('period').innerText = nextP;
                
                // YOUR ORIGINAL LOGIC - DO NOT CHANGE
                const type = (parseInt(latest.number) + 3) % 2 === 0 ? "BIG" : "SMALL";
                const pRes = document.getElementById('p-res');
                pRes.innerText = type;
                pRes.style.color = type === 'BIG' ? '#00ff88' : '#ff003c';
                pRes.style.textShadow = `0 0 25px ${type === 'BIG' ? '#00ff88' : '#ff003c'}`;
                currentPrediction = { period: nextP, type: type };
            }
        } catch(e) {}
    }

    function showResultAnim(win) {
        const overlay = document.getElementById('resOverlay');
        const msg = document.getElementById('resMsg');
        if(win) {
            msg.innerHTML = `<div style="color:#00ff88; font-size: 70px; font-weight:900; font-family:'Orbitron'; text-shadow:0 0 50px #00ff88;">WINNER</div>`;
            confetti({ particleCount: 400, spread: 150, origin: { y: 0.5 }, colors: ['#00ff88', '#ffffff', '#00f3ff'] });
            // Win Flash Effect
            document.body.style.boxShadow = "inset 0 0 100px #00ff8855";
            setTimeout(() => document.body.style.boxShadow = "none", 2000);
        } else {
            msg.innerHTML = `<div style="color:#ff003c; font-size: 70px; font-weight:900; font-family:'Orbitron'; text-shadow:0 0 50px #ff003c;">LOSE</div>`;
        }
        overlay.classList.add('show');
        setTimeout(() => overlay.classList.remove('show'), 3500);
    }
</script>
</body>
</html>
