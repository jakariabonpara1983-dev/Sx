<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #010203; color: #00ff88; font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .secure-container { width: 360px; padding: 25px; border: 2px solid #00ff88; border-radius: 40px; background: rgba(0,0,0,0.98); box-shadow: 0 0 60px rgba(0, 255, 136, 0.2); }
        #prediction { font-size: 5.5rem; font-weight: 900; text-shadow: 0 0 35px currentColor; transition: 0.5s; }
        .dot-loader { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>

<body onload="initializeShadow()">
    <div class="secure-container text-center">
        <h1 class="text-white text-lg font-black tracking-[0.4em] mb-6">SHADOW V6 ACTIVE</h1>
        
        <div class="bg-white/5 p-4 rounded-3xl border border-green-500/20 mb-6">
            <p class="text-[9px] text-gray-500 mb-1">HMAC_ENCRYPTED_PERIOD</p>
            <p id="period" class="text-2xl font-bold text-white tracking-[0.2em]">INITIALIZING</p>
        </div>

        <div class="py-4">
            <p class="text-[10px] text-green-400 font-bold tracking-[0.3em]">PROBABILISTIC_RESULT</p>
            <div id="prediction" class="dot-loader">---</div>
            <p id="status" class="text-[9px] text-blue-500 mt-4 uppercase">Connecting via Ghost Proxy...</p>
        </div>

        <div id="debug-stream" class="mt-6 text-[7px] text-green-900 break-all h-12 overflow-hidden opacity-30 font-mono text-left"></div>
    </div>

    <script>
        const ENGINE = {
            // Using a different proxy to bypass previous blocks
            RELAY: "https://api.allorigins.win/get?url=",
            EP: "https://api.9987up.cc/api/web/native/v1/all/getHistoryIssuePage",
            SECRET: "SX_QUANTUM_CORE_2026"
        };

        let lastPulse = "";

        async function initializeShadow() {
            setInterval(fetchQuantumData, 4000);
            fetchQuantumData();
        }

        async function fetchQuantumData() {
            try {
                // HMAC-SHA256 Signature Generation
                const ts = Date.now();
                const salt = CryptoJS.lib.WordArray.random(16).toString();
                const signature = CryptoJS.HmacSHA256(ts + salt, ENGINE.SECRET).toString();
                
                const targetUrl = `${ENGINE.EP}?type=1&signature=${signature}&_=${ts}`;
                const finalUrl = `${ENGINE.RELAY}${encodeURIComponent(targetUrl)}`;

                const res = await fetch(finalUrl);
                const json = await res.json();
                const data = JSON.parse(json.contents);
                const current = data.data.list[0];

                if (current.issueNumber !== lastPulse) {
                    lastPulse = current.issueNumber;
                    
                    // SHA-512 Logging
                    const hash = CryptoJS.SHA512(current.issueNumber + current.number + salt).toString();
                    document.getElementById('debug-stream').innerText = "SHA512_HASH: " + hash;

                    // Update Period
                    document.getElementById('period').innerText = (BigInt(current.issueNumber) + 1n).toString();

                    // Prediction Logic (Big/Small)
                    const num = parseInt(current.number);
                    const result = num >= 5 ? "BIG" : "SMALL";
                    
                    updateDisplay(result);
                    document.getElementById('status').innerText = "TUNNEL SECURE - DATA SYNCED";
                }
            } catch (err) {
                document.getElementById('status').innerText = "REROUTING VIA BACKUP ENGINES...";
            }
        }

        function updateDisplay(res) {
            const el = document.getElementById('prediction');
            el.innerText = res;
            el.classList.remove('dot-loader');
            el.style.color = (res === "BIG") ? "#00ff88" : "#ff003c";
            el.style.textShadow = `0 0 40px ${(res === "BIG") ? "#00ff88" : "#ff003c"}`;
        }
    </script>
